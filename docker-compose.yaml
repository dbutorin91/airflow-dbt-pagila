version: '3.8'
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
      
  airflow-webserver:
    image: apache/airflow:2.8.1
    command: webserver
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${AIRFLOW_DB}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__RBAC: 'true'
      AIRFLOW_CONN_POSTGRES_DEFAULT: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DWH_DB}
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${POSTGRES_USER}
      _AIRFLOW_WWW_USER_PASSWORD: ${POSTGRES_PASSWORD}
      _PIP_ADDITIONAL_REQUIREMENTS: "dbt-core dbt-postgres"
    volumes:
      - ./dbt_pagila:/opt/airflow/dbt_pagila
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./scripts:/opt/airflow/scripts
    depends_on:
      - postgres

  airflow-scheduler:
    image: apache/airflow:2.8.1
    command: scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${AIRFLOW_DB}
      AIRFLOW_CONN_POSTGRES_DEFAULT: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DWH_DB}
      _AIRFLOW_DB_UPGRADE: 'true'
      _PIP_ADDITIONAL_REQUIREMENTS: "dbt-core dbt-postgres"
    volumes:
      - ./dbt_pagila:/opt/airflow/dbt_pagila
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./scripts:/opt/airflow/scripts
    depends_on:
      - postgres

  superset:
    image: apache/superset:latest-dev
    container_name: superset-dev
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=local
      - SUPERSET_LOAD_EXAMPLES=no
      - SUPERSET_ADMIN_USERNAME=airflow
      - SUPERSET_ADMIN_PASSWORD=airflow
      - SUPERSET_ADMIN_EMAIL=airflow@superset.com
      - SUPERSET_ADMIN_FIRST_NAME=Airflow
      - SUPERSET_ADMIN_LAST_NAME=User
      - DATABASE_DIALECT=postgresql
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_DB=superset
      - DATABASE_USER=superset
      - DATABASE_PASSWORD=superset
    volumes:
      - superset_data:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py
    depends_on:
      - postgres
    command: >
      sh -c "
      echo 'Running database migrations...' &&
      superset db upgrade &&
      echo 'Creating admin user...' &&
      superset fab create-admin --username airflow --firstname Airflow --lastname User --email admin@example.com --password airflow || echo 'Airflow user may already exist' &&
      echo 'Initializing Superset...' &&
      superset init &&
      echo 'Starting Superset server...' &&
      superset run -p 8088 --host 0.0.0.0 --with-threads --reload
      "
  redis:
    image: redis:7-alpine
    container_name: superset-redis
    volumes:
      - redis_data:/data

volumes:
  postgres-db-volume:
  superset_data:
  redis_data: